id: local_lighteval
name: Local LightEval
description: Local LightEval for evaluation framework
type: custom
runtime:
  local:
    command: "python main.py"
    env:
      # - name: LOG_LEVEL
      #   value: DEBUG
      - name: OCI_INSECURE
        value: "true"

benchmarks:
  - id: gsm8k
    name: GSM8K
    description: Grade School Math 8K - arithmetic reasoning
    category: math
    metrics:
      - exact_match
      - accuracy
    num_few_shot: 8
    dataset_size: 1319
    tags:
      - math
      - reasoning
      - local_lighteval
  - id: hellaswag
    name: HellaSwag
    description: Commonsense reasoning around everyday activities
    category: reasoning
    metrics:
      - accuracy
      - acc_norm
    num_few_shot: 0
    dataset_size: 10042
    tags:
      - reasoning
      - commonsense
      - local_lighteval